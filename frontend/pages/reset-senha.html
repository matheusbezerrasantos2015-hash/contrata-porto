<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Nova Senha — ContrataPorto</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="shortcut icon" href="../assets/favicon.png">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card-wrap">
      <div style="text-align: center; margin-bottom: 24px;">
        <h1 style="color: #4f46e5; margin-bottom: 8px;">ContrataPorto</h1>
        <div style="height: 4px; width: 40px; background: #4f46e5; margin: 0 auto; border-radius: 2px;"></div>
      </div>

      <div id="reset-form-container">
        <h1>Criar nova senha</h1>
        <p class="auth-subtitle">Digite sua nova senha abaixo.</p>

        <div class="form-group">
          <label for="nova-senha">Nova senha (mínimo 6 caracteres)</label>
          <input type="password" id="nova-senha" class="input" placeholder="Digite sua nova senha">
        </div>

        <div class="form-group" style="margin-top: 16px;">
          <label for="conf-senha">Confirme a nova senha</label>
          <input type="password" id="conf-senha" class="input" placeholder="Repita a nova senha">
        </div>

        <button id="btn-salvar" class="btn btn-primary btn-block" style="margin-top: 24px;">
          Salvar nova senha
        </button>
      </div>

      <!-- Estado de sucesso -->
      <div id="success-step" style="display:none; text-align:center;">
        <div style="font-size:48px; margin-bottom:16px;">✅</div>
        <h2>Senha alterada com sucesso!</h2>
        <p>Você já pode usar sua nova senha para entrar no sistema.</p>
        <a href="./login.html" class="btn btn-primary btn-block" style="margin-top:24px; text-decoration: none; display: block;">
          Ir para o login
        </a>
      </div>

      <!-- Estado de erro de link inválido -->
      <div id="invalid-token-step" style="display:none; text-align:center;">
        <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
        <h2>Link inválido ou expirado</h2>
        <p>Este link de recuperação não é mais válido.</p>
        <a href="./esqueci-senha.html" class="btn btn-secondary btn-block" style="margin-top:24px; text-decoration: none; display: block;">
          Solicitar novo link
        </a>
      </div>

      <div id="error-msg" style="display:none; color: #dc2626; background: #fee2e2; padding: 12px; border-radius: 6px; margin-top: 16px; text-align: center;"></div>
    </div>
  </div>
  <script type="module" src="../js/reset-senha.js"></script>
</body>
</html>
