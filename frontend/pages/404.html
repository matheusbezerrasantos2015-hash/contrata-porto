<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada | ContrataPorto</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        :root {
            --brand-primary: #0162A8;
            --brand-dark: #004d85;
            --brand-light: #e6f0f7;
            --text-main: #334155;
            --text-light: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
        }

        .error-container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, var(--brand-primary), #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .error-title {
            font-size: 1.875rem;
            font-weight: 700;
            margin: 1rem 0;
            color: #1e293b;
        }

        .error-message {
            font-size: 1.125rem;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--brand-primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(1, 98, 168, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--brand-dark);
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(1, 98, 168, 0.3);
        }

        .btn-ghost {
            color: var(--brand-primary);
            border: 1px solid var(--brand-light);
            background-color: transparent;
        }

        .btn-ghost:hover {
            background-color: var(--brand-light);
        }

        .illustration {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 2rem;
            height: auto;
        }

        .logo-back {
            position: absolute;
            top: 2rem;
            left: 2rem;
        }

        .logo-back img {
            height: 32px;
        }
    </style>
</head>
<body>
    <div class="logo-back">
        <a href="/ContrataPorto/index.html">
            <img src="../assets/favicon.png" alt="ContrataPorto">
        </a>
    </div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Oops! Página não encontrada</h1>
        <p class="error-message">
            A página que você está procurando pode ter sido removida, mudado de nome ou está temporariamente indisponível.
        </p>
        
        <div class="actions">
            <a href="/ContrataPorto/index.html" class="btn btn-primary">Voltar para a Home</a>
            <a href="/ContrataPorto/frontend/pages/jobs.html" class="btn btn-ghost">Ver todas as vagas</a>
        </div>
    </div>
</body>
</html>
