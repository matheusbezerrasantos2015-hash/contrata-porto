<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifique seu e-mail | ContrataPorto</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <link rel="shortcut icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="../css/index.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #ffffff 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .verification-card {
            background: var(--white);
            max-width: 440px;
            width: 90%;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 40px;
        }

        .logo-container img {
            height: 72px;
            width: auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 12px 0;
        }

        p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        #userEmail {
            color: var(--primary);
            font-weight: 600;
        }

        .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 32px;
        }

        .code-input {
            width: 52px;
            height: 64px;
            background: var(--white);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.2s ease;
            outline: none;
        }

        .code-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn-verify {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
            margin-bottom: 24px;
        }

        .btn-verify:hover {
            background: var(--primary-hover);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .resend-container {
            font-size: 14px;
            color: #94a3b8;
        }

        .resend-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #94a3b8;
            cursor: not-allowed;
            text-decoration: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fee2e2;
            display: flex;
        }

        .message.success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #dcfce7;
            display: flex;
        }

        @media (max-width: 480px) {
            .verification-card {
                padding: 32px 24px;
            }
            .code-inputs {
                gap: 8px;
            }
            .code-input {
                width: 44px;
                height: 56px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="verification-card">
        <div class="logo-container">
            <img src="../assets/logo-contrata-porto.png" alt="ContrataPorto">
        </div>
        <h1>Verifique seu e-mail</h1>
        <p>Enviamos um código de 6 dígitos para <br><span id="userEmail">carregando...</span></p>

        <div id="message" class="message"></div>

        <div class="code-inputs" id="inputsContainer">
            <input type="text" class="code-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="code-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="code-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="code-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="code-input" maxlength="1" pattern="\d*" inputmode="numeric">
            <input type="text" class="code-input" maxlength="1" pattern="\d*" inputmode="numeric">
        </div>

        <button id="btnVerify" class="btn-verify">Confirmar código</button>

        <div class="resend-container">
            Não recebeu o código? <br>
            <span id="resendTimer">Reenviar em <span id="seconds">60</span>s</span>
            <a id="resendLink" class="resend-link" style="display: none;">Reenviar código</a>
        </div>
    </div>

    <script type="module" src="../js/verificar-email.js"></script>
</body>
</html>
