<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Veja detalhes completos da vaga e candidate-se rapidamente." />
  <title>Detalhe da vaga | ContrataPorto</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" type="image/png" href="../assets/favicon.png">
</head>
<body>

  <main class="app-main job-two-col">
    <article class="section-card">
      <div id="jobContainer"></div>
      <p id="feedback" class="message"></p>
    </article>

    <aside class="section-card sticky-cta card">
      <h3 style="margin-bottom:8px;">Pronto para dar o próximo passo?</h3>
      <p class="hero-subtitle">Candidate-se agora e acompanhe seu status em tempo real.</p>
      <div class="card-actions" style="margin-top:0;">
        <button id="applyButton" class="btn btn-primary" disabled>Candidatar</button>
        <button id="favoriteButton" class="btn btn-ghost" disabled>Salvar vaga</button>
      </div>
      <div class="chips" style="margin-top:12px;">
        <span class="chip">Resposta rápida</span>
        <span class="chip">Processo simplificado</span>
      </div>
    </aside>
  </main>

  <div id="appFooter"></div>
  <script type="module" src="../js/layout.js"></script>
  <script type="module" src="../js/job.js"></script>
</body>
</html>
