<header class="app-header">
  <div class="header-wrap">
    <a href="./index.html" class="brand">
      <!-- Desktop: logo completa -->
      <img src="../assets/textlogo.png" alt="ContrataPorto" class="logo-desktop">
      <!-- Mobile: só o ícone -->
      <img src="../assets/favicon.png" alt="ContrataPorto" class="logo-mobile">
    </a>
    
    <div class="header-actions">
      <nav class="nav-list" id="navList">
        <a href="./index.html">Explorar Vagas</a>
        <a href="./favorites.html" class="nav-auth-only">Favoritos</a>
        <a href="./dashboard.html" class="nav-auth-only" id="navDashboard">Painel</a>
        <a href="./settings.html" class="nav-auth-only" id="settingsLink">Configurações</a>
        <a href="./login.html" class="btn btn-secondary login-nav-btn" id="loginBtn">Entrar</a>
      </nav>
      
      <div id="userProfile" class="user-profile-trigger hidden">
        <div class="avatar" id="userAvatar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div class="user-dropdown card">
          <div class="dropdown-header">
            <strong id="headerUserName">Usuário</strong>
            <span id="headerUserEmail">email@exemplo.com</span>
          </div>
          <hr />
          <a href="./settings.html" class="dropdown-item" id="settingsLinkDropdown">Configurações</a>
          <button id="logoutBtn" class="dropdown-item" style="color: var(--error-500);">Sair da conta</button>
        </div>
      </div>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
