server {
    listen 8080;
    server_name localhost;

    # Raiz do Laravel (public/)
    root /app/public;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # ── Redirecionamentos do frontend legado (HTML estático) → SPA React ─────
    location = /frontend/pages/index.html          { return 301 /; }
    location = /frontend/pages/jobs.html           { return 301 /vagas; }
    location = /frontend/pages/job.html            { return 301 /vagas; }
    location = /frontend/pages/login.html          { return 301 /login; }
    location = /frontend/pages/cadastro.html       { return 301 /cadastro; }
    location = /frontend/pages/favorites.html      { return 301 /favoritos; }
    location = /frontend/pages/candidate-dashboard.html { return 301 /dashboard/candidato; }
    location = /frontend/pages/company-dashboard.html   { return 301 /dashboard/empresa; }
    location = /frontend/pages/candidate-settings.html  { return 301 /settings/candidato; }
    location = /frontend/pages/company-settings.html    { return 301 /settings/empresa; }
    location = /frontend/pages/forgot-password.html     { return 301 /esqueci-senha; }
    location = /frontend/pages/reset-password.html      { return 301 /reset-senha; }
    location = /frontend/pages/verify-email.html        { return 301 /verificar-email; }
    location ~ ^/frontend/pages/                 { return 301 /; }

    # ── Assets estáticos do Laravel (emails, etc.) ───────────────────────────
    location /frontend/assets/ {
        root /app/public;
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.png {
        root /app/public/app;
        try_files $uri =404;
    }

    location = /favicon.ico {
        root /app/public/app;
        try_files /favicon.png =404;
    }

    # ── Assets estáticos da SPA (cache longo) ────────────────────────────────
    location /app/assets/ {
        root /app/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API Laravel → PHP-FPM ────────────────────────────────────────────────
    location /api/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Arquivos PHP (Laravel) ───────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # ── SPA React (fallback para todas as outras rotas) ──────────────────────
    location / {
        root /app/public/app;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
